<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PixelWar 🎨 - Paint the World!</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #1a1a2e;
      color: white;
      font-family: 'Segoe UI', sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      min-height: 100vh;
      padding: 20px;
    }
    h1 {
      font-size: 2rem;
      margin-bottom: 5px;
      background: linear-gradient(90deg, #ff6b6b, #ffd93d, #6bcb77, #4d96ff);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }
    .subtitle { color: #888; margin-bottom: 15px; font-size: 0.9rem; }
    .online { color: #6bcb77; font-size: 0.85rem; margin-bottom: 10px; }
    #cooldown-bar {
      width: 400px;
      height: 8px;
      background: #333;
      border-radius: 10px;
      margin-bottom: 15px;
      overflow: hidden;
    }
    #cooldown-fill {
      height: 100%;
      width: 0%;
      background: linear-gradient(90deg, #ff6b6b, #ffd93d);
      border-radius: 10px;
      transition: width 0.1s;
    }
    #cooldown-text {
      font-size: 0.85rem;
      color: #ffd93d;
      margin-bottom: 10px;
      height: 20px;
    }
    .colors {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      margin-bottom: 15px;
      justify-content: center;
      max-width: 420px;
    }
    .color-btn {
      width: 35px;
      height: 35px;
      border-radius: 6px;
      border: 3px solid transparent;
      cursor: pointer;
      transition: transform 0.1s, border 0.1s;
    }
    .color-btn:hover { transform: scale(1.15); }
    .color-btn.selected { border: 3px solid white; transform: scale(1.2); }
    #canvas-container {
      border: 2px solid #444;
      border-radius: 8px;
      overflow: hidden;
      cursor: crosshair;
      box-shadow: 0 0 30px rgba(77, 150, 255, 0.3);
    }
    canvas { display: block; }
    .footer {
      margin-top: 15px;
      color: #555;
      font-size: 0.75rem;
    }
  </style>
</head>
<body>
  <h1>🎨 PixelWar</h1>
  <p class="subtitle">Paint the world together — one pixel at a time!</p>
  <p class="online" id="online-count">🟢 1 player online</p>
  <div id="cooldown-bar"><div id="cooldown-fill"></div></div>
  <div id="cooldown-text">✅ Ready to place!</div>
  <div class="colors" id="color-palette"></div>
  <div id="canvas-container">
    <canvas id="pixelCanvas"></canvas>
  </div>
  <p class="footer">Click a color → Click a pixel → Wait 5 seconds → Repeat!</p>

  <script src="/socket.io/socket.io.js"></script>
  <script>
    const socket = io();
    let GRID_SIZE = 64;
    let CELL_SIZE = 10;
    let canvas, ctx;
    let selectedColor = '#FF0000';
    let canPlace = true;
    let cooldownInterval = null;
    let cooldownEnd = 0;
    let gridData = [];

    socket.on('init', ({ canvas: initialCanvas, colors, gridSize }) => {
      GRID_SIZE = gridSize;
      gridData = initialCanvas;
      CELL_SIZE = Math.min(Math.floor(600 / GRID_SIZE), 12);

      canvas = document.getElementById('pixelCanvas');
      ctx = canvas.getContext('2d');
      canvas.width = GRID_SIZE * CELL_SIZE;
      canvas.height = GRID_SIZE * CELL_SIZE;

      // Draw palette
      const palette = document.getElementById('color-palette');
      colors.forEach(color => {
        const btn = document.createElement('div');
        btn.className = 'color-btn' + (color === selectedColor ? ' selected' : '');
        btn.style.background = color;
        btn.onclick = () => {
          document.querySelectorAll('.color-btn').forEach(b => b.classList.remove('selected'));
          btn.classList.add('selected');
          selectedColor = color;
        };
        palette.appendChild(btn);
      });

      drawCanvas();
    });

    function drawCanvas() {
      for (let y = 0; y < GRID_SIZE; y++) {
        for (let x = 0; x < GRID_SIZE; x++) {
          ctx.fillStyle = gridData[y][x];
          ctx.fillRect(x * CELL_SIZE, y * CELL_SIZE, CELL_SIZE, CELL_SIZE);
          ctx.strokeStyle = 'rgba(0,0,0,0.05)';
          ctx.strokeRect(x * CELL_SIZE, y * CELL_SIZE, CELL_SIZE, CELL_SIZE);
        }
      }
    }

    socket.on('pixel_placed', ({ x, y, color }) => {
      gridData[y][x] = color;
      ctx.fillStyle = color;
      ctx.fillRect(x * CELL_SIZE, y * CELL_SIZE, CELL_SIZE, CELL_SIZE);
      ctx.strokeStyle = 'rgba(0,0,0,0.05)';
      ctx.strokeRect(x * CELL_SIZE, y * CELL_SIZE, CELL_SIZE, CELL_SIZE);
    });

    socket.on('cooldown', ({ remaining }) => {
      if (remaining > 0) {
        canPlace = false;
        cooldownEnd = Date.now() + remaining * 1000;
        startCooldownBar(remaining);
      } else {
        canPlace = true;
      }
    });

    socket.on('player_count', (count) => {
      document.getElementById('online-count').textContent = `🟢 ${count} player${count > 1 ? 's' : ''} online`;
    });

    function startCooldownBar(seconds) {
      if (cooldownInterval) clearInterval(cooldownInterval);
      const total = seconds * 1000;
      cooldownInterval = setInterval(() => {
        const remaining = cooldownEnd - Date.now();
        if (remaining <= 0) {
          clearInterval(cooldownInterval);
          document.getElementById('cooldown-fill').style.width = '0%';
          document.getElementById('cooldown-text').textContent = '✅ Ready to place!';
          canPlace = true;
        } else {
          const pct = (remaining / total) * 100;
          document.getElementById('cooldown-fill').style.width = pct + '%';
          document.getElementById('cooldown-text').textContent = `⏳ Wait ${(remaining/1000).toFixed(1)}s`;
        }
      }, 100);
    }

    document.getElementById('canvas-container').addEventListener('click', (e) => {
      if (!canvas || !canPlace) return;
      const rect = canvas.getBoundingClientRect();
      const x = Math.floor((e.clientX - rect.left) / CELL_SIZE);
      const y = Math.floor((e.clientY - rect.top) / CELL_SIZE);
      if (x >= 0 && x < GRID_SIZE && y >= 0 && y < GRID_SIZE) {
        socket.emit('place_pixel', { x, y, color: selectedColor });
      }
    });
  </script>
</body>
</html>
